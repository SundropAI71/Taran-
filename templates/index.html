<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taran 🤖</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --user-bg:   #1f6feb;
      --taran-bg:  #21262d;
      --text:      #e6edf3;
      --subtext:   #8b949e;
      --danger:    #f85149;
      --radius:    12px;
      --font:      'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                               */
    /* ------------------------------------------------------------------ */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                               */
    /* ------------------------------------------------------------------ */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .avatar {
      font-size: 2rem;
      line-height: 1;
    }

    .header-info h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
    }

    .header-info p {
      font-size: 0.78rem;
      color: var(--subtext);
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--subtext);
      cursor: pointer;
      font-size: 1rem;
      padding: 6px 10px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-icon:hover { background: var(--border); color: var(--text); }
    .btn-icon.active { border-color: var(--accent2); color: var(--accent2); }

    /* ------------------------------------------------------------------ */
    /* Chat window                                                          */
    /* ------------------------------------------------------------------ */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* Intro banner */
    .intro-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 0.9rem;
      color: var(--subtext);
      white-space: pre-wrap;
      line-height: 1.55;
    }

    /* Message bubbles */
    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 85%;
    }
    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.taran { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 0.93rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user  .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
    .message.taran .bubble { background: var(--taran-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    .bubble-icon { font-size: 1.4rem; flex-shrink: 0; }

    /* Typing indicator */
    .typing .bubble {
      background: var(--taran-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
    }
    .dots span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--subtext);
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ------------------------------------------------------------------ */
    /* Input bar                                                            */
    /* ------------------------------------------------------------------ */
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      max-height: 120px;
      overflow-y: auto;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--subtext); }

    .btn-send {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0 16px;
      transition: opacity 0.15s;
    }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:disabled { opacity: 0.4; cursor: default; }

    /* ------------------------------------------------------------------ */
    /* Status badge                                                         */
    /* ------------------------------------------------------------------ */
    .status-bar {
      text-align: center;
      font-size: 0.72rem;
      color: var(--subtext);
      padding: 4px 0 6px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ------------------------------------------------------------------ */
    /* Scrollbar                                                            */
    /* ------------------------------------------------------------------ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>Taran</h1>
      <p>Android Intelligence · Logic · Humor · v{{ version }}</p>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="btn-abilities" title="Show abilities">📋</button>
      <button class="btn-icon" id="btn-clear"    title="Clear chat">🗑️</button>
    </div>
  </header>

  <!-- Chat window -->
  <div class="chat-window" id="chat-window">
    <div class="intro-banner">{{ intro }}</div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea id="user-input" rows="1" placeholder="Message Taran…" autocomplete="off"></textarea>
    <button class="btn-send" id="btn-send" title="Send (Enter)">➤</button>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="status-bar">
    Press Enter to send · Shift+Enter for new line
  </div>

</div>

<script>
  const chatWindow  = document.getElementById("chat-window");
  const inputEl     = document.getElementById("user-input");
  const sendBtn     = document.getElementById("btn-send");
  const statusBar   = document.getElementById("status-bar");
  const btnAbil     = document.getElementById("btn-abilities");
  const btnClear    = document.getElementById("btn-clear");

  const STATUS_IDLE = "Press Enter to send · Shift+Enter for new line";

  // -----------------------------------------------------------------------
  // Helpers
  // -----------------------------------------------------------------------

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function addMessage(role, text) {
    const wrap = document.createElement("div");
    wrap.className = "message " + role;

    const icon = document.createElement("div");
    icon.className = "bubble-icon";
    icon.textContent = role === "user" ? "🧑" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = escapeHtml(text).replace(/\n/g, "<br>");

    wrap.appendChild(icon);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "message taran typing";
    wrap.id = "typing-indicator";

    const icon = document.createElement("div");
    icon.className = "bubble-icon";
    icon.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

    wrap.appendChild(icon);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  function setStatus(msg) {
    statusBar.textContent = msg;
  }

  // -----------------------------------------------------------------------
  // Send message
  // -----------------------------------------------------------------------

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    addMessage("user", text);
    showTyping();
    setStatus("Taran is thinking…");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      removeTyping();
      addMessage("taran", data.response);
      setStatus(STATUS_IDLE);
    } catch (err) {
      removeTyping();
      addMessage("taran", "⚠️ Connection error. Is the server running?");
      setStatus("Error — check the server console.");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // -----------------------------------------------------------------------
  // Abilities
  // -----------------------------------------------------------------------

  async function showAbilities() {
    btnAbil.disabled = true;
    try {
      const res  = await fetch("/abilities");
      const data = await res.json();
      const lines = [`Here are my current abilities (${data.abilities.length} total):\n`];
      for (const a of data.abilities) {
        lines.push(`  ${a.emoji} ${a.name}\n     ${a.description}\n     Try: ${a.examples.map(e => '"' + e + '"').join(", ")}`);
      }
      lines.push("\nMore abilities are on the way! 🚀");
      addMessage("taran", lines.join("\n"));
    } catch (err) {
      addMessage("taran", "⚠️ Could not fetch abilities.");
    } finally {
      btnAbil.disabled = false;
    }
  }

  // -----------------------------------------------------------------------
  // Clear chat
  // -----------------------------------------------------------------------

  async function clearChat() {
    if (!confirm("Clear the conversation? This cannot be undone.")) return;
    await fetch("/clear", { method: "POST" });
    // Remove all messages except the intro banner
    const messages = chatWindow.querySelectorAll(".message");
    messages.forEach(m => m.remove());
    setStatus("Conversation cleared.");
  }

  // -----------------------------------------------------------------------
  // Event listeners
  // -----------------------------------------------------------------------

  sendBtn.addEventListener("click", sendMessage);
  btnAbil.addEventListener("click", showAbilities);
  btnClear.addEventListener("click", clearChat);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-grow textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // Focus input on load
  inputEl.focus();
</script>
</body>
</html>
